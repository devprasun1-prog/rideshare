<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>RideShare | Travel together</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <div class="logo">
            RideApp
            </div>
        </div>
    </header>
    
    <main class="main">
        <section class="hero">
            <div class="container">
                <h1 class="hero-tittle">
                    Find a Shared Ride Instantly
                </h1>
                <p class="hero-subtitle">
                    Travel together. Save money. Build community.
                </p>
                <form id="searchForm" class="search-form">
                    <div class="form-group">
                        <lebel for="from">From</lebel>
                        <input type="text"
                        id="from"
                        name="from"
                        placeholder="Enter starting location"
                        required/>
                    </div>

                    <div class="form-group">
                        <lebel for="to"></lebel>
                        <input
                        type="text"
                        id="to"
                        name="to"
                        placeholder="Enter destination"
                        required/>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        Find Ride
                    </button>
                </form>
                <div class="sffer-section">
                    <button
                    type="button"
                    id="offerBtn"
                    class="btn btn-secondary">
                    Offer a Ride</button>
                </div>
            </div>
        </section>

        <section class="how-it-works">
            <div class="container">
                <h2>How It Works</h2>
                <div class="steps">
                    <div class="step">
                        <h3>1. Search Route</h3>
                        <p> Enter where you want to travel.</p>
                    </div>
                    <div class="step">
                        <h3>2. Connect</h3>
                        <p>Find people going the some way.</p>
                    </div>
                    <div class="step">
                        <h3>3. Travel Together</h3>
                        <p>Share the ride and reduce cost.</p>
                    </div>
                </div>
            </div>
        </section>

    </main>
    <footer class="footer">
        <div class="container">
            <p>© 2026 RideApp. All rightds reserved.</p>
        </div>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
