<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>RideApp | Search Results</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-container">

      <div class="logo">
        RideApp
      </div>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="offer.html">Offer Ride</a>
        <a href="profile.html">Profile</a>
        <a href="support.html">Support</a>
      </nav>

    </div>
  </header>


  <!-- MAIN -->
  <main class="main">

    <!-- SEARCH INFO -->
    <section class="search-info">
      <div class="container">

        <h2 id="routeTitle">
          Searching rides...
        </h2>

        <button
          class="btn btn-secondary"
          onclick="goBack()"
        >
          Change Route
        </button>

      </div>
    </section>


    <!-- RESULTS -->
    <section class="results">
      <div class="container">

        <div
          id="resultsContainer"
          class="results-container"
        >
          <!-- Cards will load here -->
        </div>

        <div
          id="noResult"
          class="no-result hidden"
        >
          No rides found for this route.
        </div>

      </div>
    </section>

  </main>


  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 RideApp. All rights reserved.</p>
    </div>
  </footer>


  <!-- JS -->
  <script src="js/search.js"></script>

</body>
</html>
